<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="H — Your personal offline micro-social space">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="H">
  <link rel="manifest" href="./manifest.json">
  <title>H</title>
  <style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg:          #000000;
–bg-elevated: #0d0d0d;
–bg-card:     #111111;
–bg-hover:    #161616;
–bg-input:    #0d0d0d;
–border:      #222222;
–border-light:#2f2f2f;
–accent:      #ffffff;
–accent-dim:  #e7e9ea;
–muted:       #71767b;
–muted-light: #555555;
–blue:        #1d9bf0;
–blue-hover:  #1a8cd8;
–red:         #f4212e;
–radius-sm:   4px;
–radius-md:   12px;
–radius-full: 9999px;
–font-main:   ‘Chirp’, -apple-system, BlinkMacSystemFont, ‘Segoe UI’, sans-serif;
–sidebar-w:   275px;
–col-w:       600px;
–transition:  0.15s ease;
}

html { font-size: 15px; }
body {
background: var(–bg);
color: var(–accent-dim);
font-family: -apple-system, BlinkMacSystemFont, ‘Segoe UI’, ‘Helvetica Neue’, sans-serif;
min-height: 100vh;
overflow-x: hidden;
-webkit-font-smoothing: antialiased;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 0px; }

/* ── Layout Shell ── */
.app-shell {
display: flex;
justify-content: center;
min-height: 100vh;
max-width: 1300px;
margin: 0 auto;
}

/* ── Left Sidebar ── */
.sidebar {
width: var(–sidebar-w);
position: sticky;
top: 0;
height: 100vh;
display: flex;
flex-direction: column;
padding: 0 12px;
overflow: hidden;
flex-shrink: 0;
}

.sidebar-logo {
display: flex;
align-items: center;
justify-content: center;
width: 50px;
height: 50px;
border-radius: var(–radius-full);
margin: 4px 0 4px -4px;
cursor: pointer;
transition: background var(–transition);
text-decoration: none;
}
.sidebar-logo:hover { background: var(–bg-hover); }
.sidebar-logo .logo-letter {
font-size: 28px;
font-weight: 700;
color: var(–accent);
line-height: 1;
font-family: ‘DM Sans’, serif;
letter-spacing: -1px;
}

.sidebar-nav { flex: 1; padding-top: 4px; }

.nav-item {
display: flex;
align-items: center;
gap: 20px;
padding: 12px 12px;
border-radius: var(–radius-full);
cursor: pointer;
transition: background var(–transition);
text-decoration: none;
color: var(–accent-dim);
font-size: 1.25rem;
font-weight: 400;
margin-bottom: 2px;
width: fit-content;
}
.nav-item:hover { background: var(–bg-hover); }
.nav-item.active { font-weight: 700; }
.nav-item svg { width: 26px; height: 26px; flex-shrink: 0; }
.nav-item span { white-space: nowrap; }

.sidebar-profile {
display: flex;
align-items: center;
gap: 12px;
padding: 12px;
border-radius: var(–radius-full);
cursor: pointer;
transition: background var(–transition);
margin-bottom: 16px;
}
.sidebar-profile:hover { background: var(–bg-hover); }
.sidebar-profile-info { flex: 1; min-width: 0; }
.sidebar-profile-name {
font-weight: 700;
font-size: 0.95rem;
color: var(–accent);
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}
.sidebar-profile-handle {
font-size: 0.85rem;
color: var(–muted);
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}
.sidebar-profile-dots { color: var(–muted); font-size: 1.2rem; margin-left: auto; }

/* ── Main Timeline Column ── */
.main-col {
width: var(–col-w);
border-left: 1px solid var(–border);
border-right: 1px solid var(–border);
min-height: 100vh;
flex-shrink: 0;
}

/* ── Timeline Header ── */
.timeline-header {
position: sticky;
top: 0;
z-index: 100;
background: rgba(0, 0, 0, 0.85);
backdrop-filter: blur(12px);
-webkit-backdrop-filter: blur(12px);
border-bottom: 1px solid var(–border);
padding: 16px 16px 0;
}
.timeline-header h2 {
font-size: 1.25rem;
font-weight: 700;
color: var(–accent);
padding-bottom: 16px;
}

/* ── Tabs ── */
.tabs {
display: flex;
border-bottom: none;
margin: 0 -16px;
}
.tab {
flex: 1;
text-align: center;
padding: 14px 0 14px;
font-size: 0.9rem;
font-weight: 500;
color: var(–muted);
cursor: pointer;
transition: background var(–transition);
position: relative;
}
.tab:hover { background: rgba(255,255,255,0.03); }
.tab.active {
color: var(–accent);
font-weight: 700;
}
.tab.active::after {
content: ‘’;
position: absolute;
bottom: 0;
left: 50%;
transform: translateX(-50%);
width: 56px;
height: 4px;
background: var(–blue);
border-radius: var(–radius-full);
}

/* ── Post Composer ── */
.composer {
display: flex;
gap: 12px;
padding: 12px 16px 8px;
border-bottom: 1px solid var(–border);
}

.composer-avatar {
flex-shrink: 0;
width: 40px;
height: 40px;
border-radius: var(–radius-full);
background: var(–bg-elevated);
overflow: hidden;
cursor: pointer;
}
.composer-avatar img {
width: 100%;
height: 100%;
object-fit: cover;
}
.composer-avatar-placeholder {
width: 100%;
height: 100%;
display: flex;
align-items: center;
justify-content: center;
background: var(–blue);
color: #fff;
font-size: 1rem;
font-weight: 700;
}

.composer-body { flex: 1; min-width: 0; }
.composer-audience {
display: inline-flex;
align-items: center;
gap: 4px;
color: var(–blue);
font-size: 0.85rem;
font-weight: 700;
padding: 3px 10px;
border: 1px solid var(–blue);
border-radius: var(–radius-full);
margin-bottom: 8px;
cursor: pointer;
}
.composer-audience svg { width: 14px; height: 14px; }

.composer-textarea {
width: 100%;
background: transparent;
border: none;
outline: none;
color: var(–accent);
font-size: 1.25rem;
font-family: inherit;
resize: none;
line-height: 1.5;
min-height: 60px;
caret-color: var(–blue);
}
.composer-textarea::placeholder { color: var(–muted); }

.composer-image-preview {
position: relative;
margin-top: 8px;
border-radius: var(–radius-md);
overflow: hidden;
max-height: 280px;
border: 1px solid var(–border);
}
.composer-image-preview img {
width: 100%;
object-fit: cover;
max-height: 280px;
}
.composer-image-preview .remove-img {
position: absolute;
top: 8px;
left: 8px;
background: rgba(0,0,0,0.75);
border: none;
color: #fff;
border-radius: var(–radius-full);
width: 30px;
height: 30px;
cursor: pointer;
font-size: 1rem;
display: flex;
align-items: center;
justify-content: center;
backdrop-filter: blur(4px);
}
.composer-image-preview .remove-img:hover { background: rgba(0,0,0,0.9); }

.composer-divider {
height: 1px;
background: var(–border);
margin: 10px 0;
}

.composer-actions {
display: flex;
align-items: center;
justify-content: space-between;
}
.composer-tools {
display: flex;
align-items: center;
gap: 2px;
}
.tool-btn {
background: none;
border: none;
color: var(–blue);
cursor: pointer;
padding: 8px;
border-radius: var(–radius-full);
display: flex;
align-items: center;
transition: background var(–transition);
}
.tool-btn:hover { background: rgba(29, 155, 240, 0.1); }
.tool-btn svg { width: 20px; height: 20px; }
.tool-btn input[type=“file”] { display: none; }

.composer-right {
display: flex;
align-items: center;
gap: 12px;
}
.char-count {
font-size: 0.85rem;
color: var(–muted);
}
.char-count.warn { color: #ffd400; }
.char-count.danger { color: var(–red); }

.post-btn {
background: var(–accent);
color: var(–bg);
border: none;
border-radius: var(–radius-full);
padding: 8px 20px;
font-size: 0.95rem;
font-weight: 700;
cursor: pointer;
transition: background var(–transition), opacity var(–transition);
font-family: inherit;
}
.post-btn:hover { background: #e7e9ea; }
.post-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── Feed ── */
.feed { }

.post-card {
display: flex;
gap: 12px;
padding: 12px 16px;
border-bottom: 1px solid var(–border);
cursor: pointer;
transition: background var(–transition);
position: relative;
}
.post-card:hover { background: var(–bg-hover); }

.post-avatar {
flex-shrink: 0;
width: 40px;
height: 40px;
border-radius: var(–radius-full);
background: var(–bg-elevated);
overflow: hidden;
}
.post-avatar img {
width: 100%;
height: 100%;
object-fit: cover;
}
.post-avatar-placeholder {
width: 100%;
height: 100%;
display: flex;
align-items: center;
justify-content: center;
background: var(–blue);
color: #fff;
font-size: 1rem;
font-weight: 700;
}

.post-body { flex: 1; min-width: 0; }

.post-header {
display: flex;
align-items: baseline;
gap: 4px;
flex-wrap: wrap;
margin-bottom: 2px;
}
.post-name {
font-weight: 700;
font-size: 0.95rem;
color: var(–accent);
}
.post-handle {
color: var(–muted);
font-size: 0.9rem;
}
.post-dot {
color: var(–muted);
font-size: 0.9rem;
}
.post-time {
color: var(–muted);
font-size: 0.9rem;
}

.post-text {
font-size: 0.95rem;
line-height: 1.55;
color: var(–accent-dim);
white-space: pre-wrap;
word-break: break-word;
margin-bottom: 6px;
}

.post-image {
border-radius: var(–radius-md);
overflow: hidden;
margin-top: 10px;
border: 1px solid var(–border);
max-height: 500px;
}
.post-image img {
width: 100%;
object-fit: cover;
max-height: 500px;
display: block;
}

.post-actions-bar {
display: flex;
align-items: center;
gap: 20px;
margin-top: 10px;
}
.post-action {
display: flex;
align-items: center;
gap: 6px;
color: var(–muted);
font-size: 0.85rem;
cursor: pointer;
transition: color var(–transition);
padding: 4px;
border-radius: var(–radius-full);
}
.post-action svg { width: 18px; height: 18px; }
.post-action:hover { color: var(–blue); }
.post-action.like:hover { color: #f91880; }
.post-action.like.liked { color: #f91880; }
.post-action.like.liked svg { fill: #f91880; }

/* ── Three-dot menu ── */
.post-menu-wrapper {
position: absolute;
top: 12px;
right: 12px;
}
.menu-trigger {
background: none;
border: none;
color: var(–muted);
cursor: pointer;
width: 34px;
height: 34px;
border-radius: var(–radius-full);
display: flex;
align-items: center;
justify-content: center;
opacity: 0;
transition: background var(–transition), opacity var(–transition);
}
.post-card:hover .menu-trigger { opacity: 1; }
.menu-trigger:hover { background: rgba(29, 155, 240, 0.1); color: var(–blue); }
.menu-trigger svg { width: 18px; height: 18px; }

.dropdown-menu {
position: absolute;
top: calc(100% + 4px);
right: 0;
background: var(–bg-card);
border: 1px solid var(–border-light);
border-radius: var(–radius-md);
box-shadow: 0 8px 32px rgba(0,0,0,0.8);
min-width: 200px;
z-index: 999;
overflow: hidden;
animation: menuIn 0.12s ease;
}
@keyframes menuIn {
from { opacity: 0; transform: scale(0.95) translateY(-4px); }
to   { opacity: 1; transform: scale(1) translateY(0); }
}
.dropdown-item {
display: flex;
align-items: center;
gap: 12px;
padding: 14px 16px;
cursor: pointer;
font-size: 0.95rem;
font-weight: 500;
color: var(–accent-dim);
transition: background var(–transition);
}
.dropdown-item:hover { background: var(–bg-hover); }
.dropdown-item.danger { color: var(–red); }
.dropdown-item svg { width: 18px; height: 18px; }

/* ── Empty State ── */
.empty-state {
display: flex;
flex-direction: column;
align-items: center;
padding: 60px 32px;
gap: 12px;
text-align: center;
}
.empty-state-icon {
width: 60px;
height: 60px;
border-radius: var(–radius-full);
background: var(–bg-elevated);
display: flex;
align-items: center;
justify-content: center;
color: var(–muted);
margin-bottom: 8px;
}
.empty-state h3 {
font-size: 1.5rem;
font-weight: 800;
color: var(–accent);
}
.empty-state p {
font-size: 0.95rem;
color: var(–muted);
max-width: 300px;
line-height: 1.5;
}

/* ── Onboarding Modal ── */
.modal-overlay {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.7);
z-index: 10000;
display: flex;
align-items: center;
justify-content: center;
backdrop-filter: blur(4px);
animation: fadeIn 0.2s ease;
}
@keyframes fadeIn {
from { opacity: 0; } to { opacity: 1; }
}

.modal {
background: var(–bg);
border-radius: 16px;
width: 90%;
max-width: 480px;
padding: 40px 32px;
animation: slideUp 0.25s ease;
border: 1px solid var(–border);
}
@keyframes slideUp {
from { opacity: 0; transform: translateY(20px); }
to   { opacity: 1; transform: translateY(0); }
}

.modal-logo {
text-align: center;
margin-bottom: 28px;
}
.modal-logo .logo-letter {
font-size: 42px;
font-weight: 800;
color: var(–accent);
letter-spacing: -2px;
}

.modal h2 {
font-size: 1.65rem;
font-weight: 800;
color: var(–accent);
margin-bottom: 8px;
letter-spacing: -0.5px;
}
.modal p {
color: var(–muted);
font-size: 0.95rem;
margin-bottom: 28px;
line-height: 1.5;
}

/* Avatar upload */
.avatar-upload-area {
display: flex;
flex-direction: column;
align-items: center;
gap: 12px;
margin-bottom: 28px;
cursor: pointer;
}
.avatar-upload-circle {
width: 80px;
height: 80px;
border-radius: var(–radius-full);
border: 2px dashed var(–border-light);
display: flex;
align-items: center;
justify-content: center;
overflow: hidden;
transition: border-color var(–transition);
background: var(–bg-elevated);
}
.avatar-upload-area:hover .avatar-upload-circle { border-color: var(–blue); }
.avatar-upload-circle img {
width: 100%;
height: 100%;
object-fit: cover;
}
.avatar-upload-circle svg { color: var(–muted); width: 28px; height: 28px; }
.avatar-upload-label {
font-size: 0.9rem;
color: var(–blue);
font-weight: 600;
}

.field {
margin-bottom: 20px;
}
.field label {
display: block;
font-size: 0.85rem;
color: var(–muted);
margin-bottom: 6px;
font-weight: 500;
}
.field input {
width: 100%;
background: var(–bg-input);
border: 1px solid var(–border-light);
border-radius: var(–radius-md);
padding: 14px 16px;
color: var(–accent);
font-size: 1rem;
font-family: inherit;
outline: none;
transition: border-color var(–transition);
}
.field input:focus { border-color: var(–blue); }
.field input::placeholder { color: var(–muted-light); }

.field-hint {
font-size: 0.8rem;
color: var(–muted);
margin-top: 5px;
}

.modal-submit {
width: 100%;
background: var(–accent);
color: var(–bg);
border: none;
border-radius: var(–radius-full);
padding: 14px;
font-size: 1rem;
font-weight: 700;
cursor: pointer;
font-family: inherit;
transition: background var(–transition);
margin-top: 8px;
}
.modal-submit:hover { background: #e7e9ea; }
.modal-submit:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Toast ── */
.toast {
position: fixed;
bottom: 24px;
left: 50%;
transform: translateX(-50%) translateY(0);
background: var(–blue);
color: #fff;
padding: 12px 24px;
border-radius: var(–radius-full);
font-size: 0.9rem;
font-weight: 600;
z-index: 99999;
animation: toastIn 0.2s ease, toastOut 0.2s ease 2.3s forwards;
white-space: nowrap;
box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
@keyframes toastIn {
from { opacity: 0; transform: translateX(-50%) translateY(16px); }
to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}
@keyframes toastOut {
from { opacity: 1; transform: translateX(-50%) translateY(0); }
to   { opacity: 0; transform: translateX(-50%) translateY(16px); }
}

/* ── Right sidebar placeholder ── */
.right-sidebar {
width: 350px;
padding: 12px 24px;
flex-shrink: 0;
}
.search-bar {
background: var(–bg-elevated);
border: 1px solid transparent;
border-radius: var(–radius-full);
display: flex;
align-items: center;
gap: 10px;
padding: 10px 16px;
margin-bottom: 16px;
transition: border-color var(–transition), background var(–transition);
}
.search-bar:focus-within {
background: var(–bg);
border-color: var(–blue);
}
.search-bar svg { color: var(–muted); width: 18px; height: 18px; flex-shrink: 0; }
.search-bar input {
background: none;
border: none;
outline: none;
color: var(–accent);
font-size: 0.95rem;
font-family: inherit;
width: 100%;
}
.search-bar input::placeholder { color: var(–muted); }

.widget-card {
background: var(–bg-elevated);
border-radius: var(–radius-md);
padding: 16px;
margin-bottom: 16px;
border: 1px solid var(–border);
}
.widget-card h3 {
font-size: 1.1rem;
font-weight: 800;
color: var(–accent);
margin-bottom: 12px;
}
.widget-stat {
display: flex;
justify-content: space-between;
padding: 8px 0;
border-bottom: 1px solid var(–border);
font-size: 0.9rem;
}
.widget-stat:last-child { border-bottom: none; }
.widget-stat-label { color: var(–muted); }
.widget-stat-value { font-weight: 700; color: var(–accent); }

/* ── Mobile ── */
@media (max-width: 1100px) {
.right-sidebar { display: none; }
}
@media (max-width: 768px) {
.sidebar { display: none; }
.main-col {
width: 100%;
border-left: none;
border-right: none;
}
.app-shell { flex-direction: column; }

/* Mobile bottom nav */
.mobile-nav {
display: flex;
position: fixed;
bottom: 0;
left: 0;
right: 0;
background: rgba(0,0,0,0.92);
border-top: 1px solid var(–border);
backdrop-filter: blur(12px);
z-index: 1000;
padding: 0 8px;
padding-bottom: env(safe-area-inset-bottom);
}
.mobile-nav-item {
flex: 1;
display: flex;
align-items: center;
justify-content: center;
padding: 14px 8px;
color: var(–accent-dim);
cursor: pointer;
}
.mobile-nav-item svg { width: 26px; height: 26px; }

body { padding-bottom: 70px; }
}
@media (min-width: 769px) {
.mobile-nav { display: none; }
}

/* ── Post entrance animation ── */
.post-card {
animation: postIn 0.25s ease;
}
@keyframes postIn {
from { opacity: 0; transform: translateY(-8px); }
to   { opacity: 1; transform: translateY(0); }
}

/* ── Liked heart fill ── */
@keyframes heartPop {
0%   { transform: scale(1); }
50%  { transform: scale(1.4); }
100% { transform: scale(1); }
}
.post-action.like.liked svg { animation: heartPop 0.3s ease; }

/* ── Composer focus ring ── */
.composer-textarea:focus + .composer-divider {
background: var(–blue);
height: 2px;
}

/* ── Image attachment preview strip ── */
.composer-image-preview { animation: fadeIn 0.2s ease; }

/* ═══════════════════════════════════════════════
   H  —  Personal Offline Micro-Social App
   app.js — All application logic

const DB_KEY_PROFILE = 'h_profile';
const DB_KEY_POSTS   = 'h_posts';
const MAX_CHARS      = 280;

/* ── State ── */
let profile       = null;
let posts         = [];
let composerImage = null;
let openMenuId    = null;

/* ── Global error boundary ── */
window.onerror = function(msg, src, line, col, err) {
  var splash = document.getElementById('splash');
  if (splash) {

/* ── Splash ── */
function hideSplash() {
  var splash = document.getElementById('splash');
  if (splash) {
    splash.classList.add('hide');
    setTimeout(function() { if (splash.parentNode) splash.parentNode.removeChild(splash); }, 350);
  }
}

/* ── Bootstrap ── */
document.addEventListener('DOMContentLoaded', function() {
  try {
    profile = loadProfile();
    posts   = loadPosts();
  } catch(e) {
    profile = null;
    posts = [];
  }

  hideSplash();

  if (!profile) {
    showOnboarding();
  } else {
    bootApp();
  }

  // Close menus on outside click
  document.addEventListener('click', function(e) {
    if (openMenuId && !e.target.closest('.post-menu-wrapper')) {
      closeAllMenus();
    }
  });
});

/* ── Service Worker ── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .catch(err => console.log('SW registration failed:', err));
  });
}

/* ══════════════════════════════════════════════
   STORAGE
══════════════════════════════════════════════ */
function loadProfile() {
  try { return JSON.parse(localStorage.getItem(DB_KEY_PROFILE)); } catch(e) { return null; }
}
function saveProfile(p) {
  localStorage.setItem(DB_KEY_PROFILE, JSON.stringify(p));
}
function loadPosts() {
  try { return JSON.parse(localStorage.getItem(DB_KEY_POSTS)) || []; } catch(e) { return []; }
}
function savePosts() {
  localStorage.setItem(DB_KEY_POSTS, JSON.stringify(posts));
}

function showOnboarding() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" id="onboard-modal">
      <div class="modal-logo"><span class="logo-letter">H</span></div>
      <h2>Welcome to H</h2>
      <p>Your personal offline space. Set up your profile to get started.</p>

      <div class="avatar-upload-area" id="avatar-area">
        <div class="avatar-upload-circle" id="avatar-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 16v-4m0 0V8m0 4H8m4 0h4"/>
            <circle cx="12" cy="12" r="10"/>
          </svg>
        </div>
        <span class="avatar-upload-label">Add profile photo</span>
        <input type="file" id="avatar-file" accept="image/*" style="display:none">
      </div>

      <div class="field">
        <label>Display Name</label>
        <input type="text" id="onboard-name" placeholder="Your name" maxlength="50" autocomplete="off">
      </div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="onboard-handle" placeholder="@username" maxlength="30" autocomplete="off">
        <div class="field-hint">Others will see this as your handle</div>
      </div>

      <button class="modal-submit" id="onboard-submit" disabled>Let's go →</button>
    </div>
  `;
  document.body.appendChild(overlay);

  // Avatar upload
  let avatarData = null;
  const avatarArea   = overlay.querySelector('#avatar-area');
  const avatarFile   = overlay.querySelector('#avatar-file');
  const avatarCircle = overlay.querySelector('#avatar-circle');

  avatarArea.addEventListener('click', () => avatarFile.click());
  avatarFile.addEventListener('change', () => {
    const file = avatarFile.files[0];
    if (!file) return;
    resizeImage(file, 300, data => {
      avatarData = data;
      avatarCircle.innerHTML = `<img src="${data}" alt="avatar">`;
    });
  });

  // Validation
  const nameInput   = overlay.querySelector('#onboard-name');
  const handleInput = overlay.querySelector('#onboard-handle');
  const submitBtn   = overlay.querySelector('#onboard-submit');

  function validate() {
    submitBtn.disabled = !nameInput.value.trim() || !handleInput.value.trim();
  }
  nameInput.addEventListener('input', validate);
  handleInput.addEventListener('input', () => {
    let v = handleInput.value.replace(/[^a-zA-Z0-9_]/g, '');
    handleInput.value = v;
    validate();
  });

  // Submit
  submitBtn.addEventListener('click', () => {
    let handle = handleInput.value.trim();
    if (!handle.startsWith('@')) handle = '@' + handle;

    profile = {
      name:   nameInput.value.trim(),
      handle: handle,
      avatar: avatarData || null
    };
    saveProfile(profile);
    overlay.remove();
    bootApp();
    showToast('Profile saved! Welcome to H ✦');
  });
}

/* ══════════════════════════════════════════════
COMPOSER
══════════════════════════════════════════════ */
function bindComposer() {
const textarea  = document.getElementById(‘post-input’);
const postBtn   = document.getElementById(‘post-btn’);
const imgUpload = document.getElementById(‘img-upload’);
const charCount = document.getElementById(‘char-count’);

textarea.addEventListener(‘input’, () => {
const len = textarea.value.length;
charCount.textContent = len;
charCount.className = ‘char-count’ + (len > 260 ? ’ danger’ : len > 220 ? ’ warn’ : ‘’);
postBtn.disabled = len === 0 && !composerImage;
autoResize(textarea);
});

imgUpload.addEventListener(‘change’, () => {
const file = imgUpload.files[0];
if (!file) return;
resizeImage(file, 1200, data => {
composerImage = data;
renderComposerPreview();
postBtn.disabled = false;
});
});

postBtn.addEventListener(‘click’, submitPost);

textarea.addEventListener(‘keydown’, e => {
if ((e.metaKey || e.ctrlKey) && e.key === ‘Enter’) submitPost();
});
}

function renderComposerPreview() {
const preview = document.getElementById(‘composer-img-preview’);
if (!composerImage) { preview.innerHTML = ‘’; return; }
preview.innerHTML = `<div class="composer-image-preview"> <img src="${composerImage}" alt="preview"> <button class="remove-img" id="remove-img" title="Remove">✕</button> </div>`;
document.getElementById(‘remove-img’).addEventListener(‘click’, () => {
composerImage = null;
document.getElementById(‘img-upload’).value = ‘’;
renderComposerPreview();
const ta = document.getElementById(‘post-input’);
document.getElementById(‘post-btn’).disabled = ta.value.trim().length === 0;
});
}

function submitPost() {
const textarea = document.getElementById(‘post-input’);
const text = textarea.value.trim();
if (!text && !composerImage) return;

const now = new Date();
const post = {
id:        generateId(),
text:      text,
image:     composerImage || null,
timestamp: now.toISOString(),
liked:     false,
likes:     0,
};

posts.unshift(post);
savePosts();

textarea.value = ‘’;
document.getElementById(‘char-count’).textContent = ‘0’;
document.getElementById(‘post-btn’).disabled = true;
textarea.style.height = ‘’;
composerImage = null;
document.getElementById(‘img-upload’).value = ‘’;
renderComposerPreview();

prependPostCard(post);
updateStats();
showToast(‘Your post is live ✦’);
}

/* ══════════════════════════════════════════════
FEED
══════════════════════════════════════════════ */
function renderFeed() {
const feed = document.getElementById(‘feed’);
if (posts.length === 0) {
feed.innerHTML = `<div class="empty-state"> <div class="empty-state-icon">${iconFeather()}</div> <h3>Nothing here yet</h3> <p>When you post something, it will show up here.</p> </div>`;
return;
}
feed.innerHTML = ‘’;
posts.forEach(p => feed.appendChild(buildPostCard(p)));
}

function prependPostCard(post) {
const feed = document.getElementById(‘feed’);
const empty = feed.querySelector(’.empty-state’);
if (empty) feed.innerHTML = ‘’;
const card = buildPostCard(post);
feed.prepend(card);
}

function buildPostCard(post) {
const wrap = document.createElement(‘article’);
wrap.className = ‘post-card’;
wrap.dataset.id = post.id;

const avatarHTML = profile.avatar
? `<img src="${profile.avatar}" alt="avatar">`
: `<div class="post-avatar-placeholder">${initials(profile.name)}</div>`;

const imageHTML = post.image
? `<div class="post-image"><img src="${post.image}" alt="post image" loading="lazy"></div>`
: ‘’;

const likedClass = post.liked ? ‘post-action like liked’ : ‘post-action like’;

wrap.innerHTML = `<div class="post-avatar">${avatarHTML}</div> <div class="post-body"> <div class="post-header"> <span class="post-name">${esc(profile.name)}</span> <span class="post-handle">${esc(profile.handle)}</span> <span class="post-dot">·</span> <span class="post-time">${formatDate(post.timestamp)}</span> </div> ${post.text ?`<div class="post-text">${esc(post.text)}</div>`: ''} ${imageHTML} <div class="post-actions-bar"> <span class="post-action" title="Reply">${iconReply()} <span>0</span></span> <span class="post-action" title="Repost">${iconRepost()} <span>0</span></span> <span class="${likedClass}" title="Like" data-likes="${post.likes}">${iconHeart()} <span>${post.likes}</span></span> <span class="post-action" title="Share">${iconShare()}</span> </div> </div> <div class="post-menu-wrapper"> <button class="menu-trigger" title="More">${iconDots()}</button> <div class="dropdown-menu" style="display:none"> <div class="dropdown-item danger" data-action="delete"> ${iconTrash()} Delete </div> </div> </div>`;

// Like toggle
const likeBtn = wrap.querySelector(’.post-action.like’);
likeBtn.addEventListener(‘click’, e => {
e.stopPropagation();
const idx = posts.findIndex(p => p.id === post.id);
if (idx === -1) return;
posts[idx].liked = !posts[idx].liked;
posts[idx].likes += posts[idx].liked ? 1 : -1;
savePosts();
likeBtn.className = posts[idx].liked ? ‘post-action like liked’ : ‘post-action like’;
likeBtn.querySelector(‘span’).textContent = posts[idx].likes;
});

// Three-dot menu
const trigger = wrap.querySelector(’.menu-trigger’);
const menu    = wrap.querySelector(’.dropdown-menu’);

trigger.addEventListener(‘click’, e => {
e.stopPropagation();
const isOpen = menu.style.display !== ‘none’;
closeAllMenus();
if (!isOpen) {
menu.style.display = ‘block’;
openMenuId = post.id;
}
});

// Delete
wrap.querySelector(’[data-action=“delete”]’).addEventListener(‘click’, e => {
e.stopPropagation();
deletePost(post.id, wrap);
});

return wrap;
}

function deletePost(id, cardEl) {
posts = posts.filter(p => p.id !== id);
savePosts();
cardEl.style.transition = ‘opacity 0.2s, transform 0.2s’;
cardEl.style.opacity = ‘0’;
cardEl.style.transform = ‘translateX(8px)’;
setTimeout(() => {
cardEl.remove();
if (posts.length === 0) renderFeed();
updateStats();
}, 200);
showToast(‘Post deleted’);
}

function closeAllMenus() {
document.querySelectorAll(’.dropdown-menu’).forEach(m => m.style.display = ‘none’);
openMenuId = null;
}

STATS
══════════════════════════════════════════════ */
function updateStats() {
const el = document.getElementById(‘stat-posts’);
const ep = document.getElementById(‘stat-photos’);
const es = document.getElementById(‘stat-since’);
if (!el) return;
el.textContent = posts.length;
ep.textContent = posts.filter(p => p.image).length;
// Member since = earliest post or today
if (posts.length > 0) {
const earliest = new Date(posts[posts.length - 1].timestamp);
es.textContent = earliest.toLocaleDateString(‘en-US’, { month: ‘short’, year: ‘numeric’ });
} else {
es.textContent = new Date().toLocaleDateString(‘en-US’, { month: ‘short’, year: ‘numeric’ });
}
}

/* ══════════════════════════════════════════════
UTILS
══════════════════════════════════════════════ */
function generateId() {
return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function initials(name) {
return name.split(’ ‘).map(w => w[0]).join(’’).toUpperCase().slice(0, 2);
}

function esc(str) {
return String(str)
.replace(/&/g, ‘&’)
.replace(/</g, ‘<’)
.replace(/>/g, ‘>’)
.replace(/”/g, ‘"’);
}

function formatDate(iso) {
const d = new Date(iso);
const now = new Date();
const diff = (now - d) / 1000;
if (diff < 60)  return Math.floor(diff) + ‘s’;
if (diff < 3600) return Math.floor(diff / 60) + ‘m’;
if (diff < 86400) return Math.floor(diff / 3600) + ‘h’;
return d.toLocaleDateString(‘en-US’, { month: ‘short’, day: ‘numeric’, year: d.getFullYear() !== now.getFullYear() ? ‘numeric’ : undefined })
+ ’ · ’ + d.toLocaleTimeString(‘en-US’, { hour: ‘2-digit’, minute: ‘2-digit’, hour12: false });
}

function autoResize(el) {
el.style.height = ‘auto’;
el.style.height = el.scrollHeight + ‘px’;
}

function resizeImage(file, maxSize, callback) {
const reader = new FileReader();
reader.onload = e => {
const img = new Image();
img.onload = () => {
let w = img.width, h = img.height;
if (w > maxSize || h > maxSize) {
if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
else       { w = Math.round(w * maxSize / h); h = maxSize; }
}
const canvas = document.createElement(‘canvas’);
canvas.width = w; canvas.height = h;
canvas.getContext(‘2d’).drawImage(img, 0, 0, w, h);
callback(canvas.toDataURL(‘image/jpeg’, 0.82));
};
img.src = e.target.result;
};
reader.readAsDataURL(file);
}

function showToast(msg) {
const t = document.createElement(‘div’);
t.className = ‘toast’;
t.textContent = msg;
document.body.appendChild(t);
setTimeout(() => t.remove(), 2700);
}
